services:
  auth:
    build: ./auth
    ports:
      - "5002:5002"
    env_file:
      - ./auth/.env
    restart: unless-stopped

  gateway:
    build: ./gateway
    ports:
      - "4000:4000"
    env_file:
      - ./gateway/.env
    environment:
      AUTH_SERVICE: http://auth:5002
    depends_on:
      - auth
    restart: unless-stopped
