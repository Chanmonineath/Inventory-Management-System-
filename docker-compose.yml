services:
  auth:
    build: ./auth
    ports:
      - "5002:5002"
    env_file:
      - ./auth/.env
    restart: unless-stopped

  inventory:
    build: ./inventory
    ports:
      - "4003:4003"
    env_file:
      - ./inventory/.env
    restart: unless-stopped

  sales:
    build: ./sales
    ports:
      - "4004:4004"
    env_file:
      - ./sales/.env
    environment:
      INVENTORY_SERVICE_URL: http://inventory:4003
    depends_on:
      - inventory
    restart: unless-stopped

  product1:
    build: ./product
    ports:
      - "4001:4001"
    env_file:
      - ./product/.env
    restart: unless-stopped

  product2:
    build: ./product
    ports:
      - "4006:4001"
    env_file:
      - ./product/.env
    restart: unless-stopped

  supplier:
    build: ./supplier
    ports:
      - "4002:4002"
    env_file:
      - ./supplier/.env
    restart: unless-stopped

  gateway:
    build: ./gateway
    ports:
      - "4000:4000"
    env_file:
      - ./gateway/.env
    environment:
      AUTH_SERVICE: http://auth:5002
      INVENTORY_SERVICE: http://inventory:4003
      SALES_SERVICE: http://sales:4004
      PRODUCT_SERVICE_1: http://product1:4001
      PRODUCT_SERVICE_2: http://product2:4001
      SUPPLIER_SERVICE: http://supplier:4002
    depends_on:
      - auth
      - inventory
      - sales
      - product1
      - product2
      - supplier
    restart: unless-stopped
